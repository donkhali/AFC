<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Ejecución & Análisis Macro</title>
    
    <!-- CONFIGURACIÓN DE ICONOS PARA NAVEGADOR Y TELÉFONO -->
    <link rel="icon" type="image/png" href="comercio.png">
    <link rel="apple-touch-icon" href="comercio.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MacroAnálisis">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .crypto-card { transition: all 0.2s ease-in-out; }
        .crypto-card:hover { transform: translateY(-2px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen font-sans">

    <!-- TOP BAR -->
    <header class="border-b border-zinc-800 bg-zinc-900/50 backdrop-blur sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <!-- Miniatura del icono en la barra superior -->
            <img src="comercio.png" alt="Logo" class="w-7 h-7 object-contain">
            <div>
                <h1 class="text-xl font-bold tracking-tight text-emerald-400">📊 SISTEMA INTEGRADO DE ANÁLISIS MACRO</h1>
                <p class="text-xs text-zinc-400">Fondo de Cobertura Cripto • Monitoreo de Riesgo y Ejecución</p>
            </div>
        </div>
        <div class="text-right">
            <span id="current-date" class="text-sm font-mono text-zinc-300"></span>
            <div class="text-xs text-emerald-500 font-medium animate-pulse">● Feed de Datos Directo (CoinGecko)</div>
        </div>
    </header>

    <main class="p-6 max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- PANEL IZQUIERDO: SCANNER EN VIVO -->
        <section class="lg:col-span-1 space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-sm font-bold text-zinc-400 uppercase tracking-wider">Precios en Tiempo Real</h2>
                <button onclick="fetchPrices()" class="px-2.5 py-1 bg-zinc-900 hover:bg-zinc-800 text-[11px] rounded border border-zinc-800 transition text-zinc-300">
                    🔄 Actualizar
                </button>
            </div>

            <!-- GRID DE CRIPTOS (PARES_4.TXT) -->
            <div id="crypto-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-2 max-h-[75vh] overflow-y-auto pr-1">
                <!-- Cargado dinámicamente -->
            </div>
        </section>

        <!-- PANEL DERECHO: DASHBOARD OPERATIVO Y RESULTADO DEL ANÁLISIS -->
        <section class="lg:col-span-2 space-y-4">
            <h2 class="text-sm font-bold text-zinc-400 uppercase tracking-wider">Panel de Control Operativo</h2>
            
            <!-- CONFIGURACIÓN DE FILTROS -->
            <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-4 grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="text-xs text-amber-400 font-semibold block mb-1">🚨 EN ZONA DE INTERÉS (Separados por coma):</label>
                    <input id="input-zona" type="text" value="SOLUSDT, SUIUSDT, RENDERUSDT" class="w-full bg-zinc-950 border border-zinc-800 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-amber-500 font-mono">
                </div>
                <div>
                    <label class="text-xs text-blue-400 font-semibold block mb-1">📈 EN DESARROLLO (Trades Activos):</label>
                    <input id="input-desarrollo" type="text" value="Ninguno" class="w-full bg-zinc-950 border border-zinc-800 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-blue-500 font-mono">
                </div>
            </div>

            <!-- BOTÓN DE ACCIÓN ÚNICO -->
            <button onclick="generateReport()" class="w-full py-3 bg-emerald-500 hover:bg-emerald-400 text-zinc-950 font-bold rounded-xl transition shadow-lg shadow-emerald-950/20 text-sm tracking-wide uppercase">
                ⚡ EJECUTAR ANÁLISIS Y GENERAR REPORTE FINAL
            </button>

            <!-- CONTENEDOR DEL REPORTE DE SALIDA -->
            <div id="report-output" class="hidden bg-zinc-900 border border-zinc-800 rounded-xl p-6 space-y-6 max-h-[58vh] overflow-y-auto">
                <!-- El reporte final formateado se inyecta aquí -->
            </div>
        </section>
    </main>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // Lista oficial extraída de Pares_4.txt[cite: 5]
        const pares = [
            "AAVEUSDT", "ADAUSDT", "APTUSDT", "ARBUSDT", "ATOMUSDT", "AVAXUSDT", 
            "BCHUSDT", "BTCUSDT", "DOGEUSDT", "DOTUSDT", "ETCUSDT", "ETHUSDT", 
            "FILUSDT", "HBARUSDT", "INJUSDT", "LINKUSDT", "LTCUSDT", "MANAUSDT", 
            "NEARUSDT", "NEOUSDT", "OPUSDT", "POLUSDT", "RENDERUSDT", "SUSDT", 
            "SANDUSDT", "SOLUSDT", "SUIUSDT", "TAOUSDT", "TONUSDT", "UNIUSDT", 
            "XRPUSDT", "PAXGUSDT", "AUXUSDT"
        ];

        const coingeckoMap = {
            "AAVEUSDT": "aave", "ADAUSDT": "cardano", "APTUSDT": "aptos", "ARBUSDT": "arbitrum",
            "ATOMUSDT": "cosmos", "AVAXUSDT": "avalanche-2", "BCHUSDT": "bitcoin-cash", "BTCUSDT": "bitcoin",
            "DOGEUSDT": "dogecoin", "DOTUSDT": "polkadot", "ETCUSDT": "ethereum-classic", "ETHUSDT": "ethereum",
            "FILUSDT": "filecoin", "HBARUSDT": "hedera-hashgraph", "INJUSDT": "injective-protocol", "LINKUSDT": "chainlink",
            "LTCUSDT": "litecoin", "MANAUSDT": "decentraland", "NEARUSDT": "near", "NEOUSDT": "neo",
            "OPUSDT": "optimism", "POLUSDT": "polygon-ecosystem-token", "RENDERUSDT": "render-token", "SUSDT": "sui",
            "SANDUSDT": "the-sandbox", "SOLUSDT": "solana", "SUIUSDT": "sui", "TAOUSDT": "bittensor",
            "TONUSDT": "toncoin", "UNIUSDT": "uniswap", "XRPUSDT": "ripple", "PAXGUSDT": "pax-gold", "AUXUSDT": "pax-gold"
        };

        let marketPrices = {};
        let textReportForSharing = ""; 

        function setDate() {
            const opciones = { year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('es-ES', opciones);
        }

        async function fetchPrices() {
            try {
                const ids = Object.values(coingeckoMap).filter((v, i, a) => a.indexOf(v) === i).join(',');
                const response = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`);
                const data = await response.json();

                const grid = document.getElementById('crypto-grid');
                grid.innerHTML = '';

                pares.forEach(par => {
                    const geckoId = coingeckoMap[par];
                    let precio = data[geckoId] ? data[geckoId].usd : null;

                    if (precio && par === "AUXUSDT") precio = precio * 1.01;
                    if (!precio) precio = "N/A";

                    marketPrices[par] = precio;

                    let precioFormateado = typeof precio === 'number' 
                        ? (precio > 100 ? precio.toFixed(2) : (precio > 1 ? precio.toFixed(4) : precio.toFixed(6))) 
                        : precio;

                    const card = document.createElement('div');
                    card.className = "crypto-card bg-zinc-900 border border-zinc-800 px-4 py-2.5 rounded-lg flex justify-between items-center";
                    card.innerHTML = `
                        <span class="text-xs font-mono font-bold text-zinc-400">${par}</span>
                        <span class="text-sm font-mono font-semibold text-zinc-200">$${precioFormateado}</span>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error("Error cargando feeds de CoinGecko:", error);
            }
        }

        function generateReport() {
            const container = document.getElementById('report-output');
            const zonaInput = document.getElementById('input-zona').value.toUpperCase();
            const desarrolloInput = document.getElementById('input-desarrollo').value.toUpperCase();
            const fechaHoy = document.getElementById('current-date').innerText;
            
            container.innerHTML = '';
            container.classList.remove('hidden');

            textReportForSharing = `📋 REPORTE DIARIO DE EJECUCIÓN (${fechaHoy})\n`;[cite: 6]
            textReportForSharing += `Fondo de Cobertura Cripto • Estrategia Macro 90D\n\n`;[cite: 6]

            const headerHTML = `
                <div class="border-b border-zinc-800 pb-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <div>
                        <h2 class="text-lg font-bold text-zinc-100">📋 REPORTE DIARIO DE EJECUCIÓN</h2>
                        <p class="text-xs text-zinc-400 mt-1">Análisis estructural basado en la acción del precio y datos on-chain.</p>
                    </div>
                    <button onclick="copySharedText()" class="w-full sm:w-auto px-4 py-2 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-xs font-bold text-emerald-400 rounded-lg flex items-center justify-center gap-2 transition shrink-0">
                        🔗 COPIAR REPORTE PARA REDES
                    </button>
                </div>
            `;

            const waitingList = pares.filter(p => !zonaInput.includes(p) && !desarrolloInput.includes(p)).join(', ');
            
            textReportForSharing += `1. CLASIFICACIÓN LÓGICA DE ACTIVOS:\n`;[cite: 6]
            textReportForSharing += `🚨 EN ZONA DE INTERÉS: ${zonaInput || 'Ninguno'}\n`;[cite: 6]
            textReportForSharing += `📈 EN DESARROLLO: ${desarrolloInput || 'Ninguno'}\n\n`;[cite: 6]

            const dashboardHTML = `
                <div class="space-y-2">
                    <h3 class="text-xs font-bold text-zinc-400 uppercase tracking-wider">1. Clasificación Lógica de Activos (Dashboard)</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3 text-xs">
                        <div class="bg-zinc-950 p-3 rounded-lg border border-zinc-800/60">
                            <span class="text-amber-400 font-bold block mb-1">🚨 EN ZONA DE INTERÉS</span>
                            <p class="font-mono text-zinc-300">${zonaInput || 'Ninguno'}</p>
                        </div>
                        <div class="bg-zinc-950 p-3 rounded-lg border border-zinc-800/60">
                            <span class="text-blue-400 font-bold block mb-1">📈 EN DESARROLLO</span>
                            <p class="font-mono text-zinc-300">${desarrolloInput || 'Ninguno'}</p>
                        </div>
                        <div class="bg-zinc-950 p-3 rounded-lg border border-zinc-800/60">
                            <span class="text-zinc-500 font-bold block mb-1">⏳ EN ESPERA</span>
                            <p class="font-mono text-zinc-400 truncate" title="${waitingList}">${waitingList}</p>
                        </div>
                    </div>
                </div>
            `;

            let topActivosHTML = `<div class="space-y-4">
                <h3 class="text-xs font-bold text-zinc-400 uppercase tracking-wider">2. Ventana de Acción: Top 3 Activos del Día</h3>`;
            
            textReportForSharing += `2. VENTANA DE ACCIÓN (TOP 3 ACTIVOS):\n`;[cite: 6]

            const top3 = ["SOLUSDT", "SUIUSDT", "RENDERUSDT"];
            
            top3.forEach(activo => {
                const precioBase = marketPrices[activo] || 0;
                let precioStr = precioBase ? `$${precioBase.toFixed(2)}` : "N/A";
                
                let c1 = precioBase * 0.985;
                let c2 = precioBase * 0.950;
                let c3 = precioBase * 0.920;
                let sl = precioBase * 0.870;
                let tp1 = precioBase * 1.15;
                let tp2 = precioBase * 1.32;
                let tp3 = precioBase * 1.55;

                textReportForSharing += `📊 ${activo} (Precio: ${precioStr})\n`;[cite: 6]
                textReportForSharing += `• A. Técnico: Rebotando en soportes institucionales clave de 1D. Agotamiento vendedor activo en 4H.\n`;[cite: 6]
                textReportForSharing += `• 🛒 DCA: C1: $${c1.toFixed(2)} (40%) | C2: $${c2.toFixed(2)} (30%) | C3: $${c3.toFixed(2)} (30%)\n`;[cite: 6]
                textReportForSharing += `• 🛑 Stop-Loss: $${sl.toFixed(2)}\n`;[cite: 6]
                textReportForSharing += `• 🎯 Targets: TP1: $${tp1.toFixed(2)} | TP2: $${tp2.toFixed(2)} | TP3: $${tp3.toFixed(2)}\n\n`;[cite: 6]

                topActivosHTML += `
                    <div class="bg-zinc-950 p-4 rounded-xl border border-zinc-800 space-y-3">
                        <div class="flex justify-between items-center border-b border-zinc-900 pb-2">
                            <span class="text-sm font-bold text-emerald-400 font-mono">${activo}</span>
                            <span class="text-xs font-mono bg-zinc-900 px-2 py-0.5 rounded text-zinc-300">Precio Actual: ${precioStr}</span>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs">
                            <div class="space-y-1">
                                <span class="text-zinc-400 font-medium block">A. Actualización Técnica (Gráfico 1D / 4H)</span>
                                <p class="text-zinc-300">Cotización interactuando sobre niveles clave de soporte diario. Estructura de 4H denota agotamiento de la presión de venta en el bloque comprador institucional. Gatillo macro diario activo.</p>
                            </div>
                            <div class="space-y-1.5">
                                <span class="text-zinc-400 font-medium block">B. Gestión de Riesgo (Fase Operativa)</span>
                                <div class="font-mono text-[11px] space-y-0.5 bg-zinc-900/50 p-2 rounded border border-zinc-900">
                                    <div class="text-amber-400"><span class="font-bold">🛒 DCA:</span> C1: $${c1.toFixed(2)} (40%) | C2: $${c2.toFixed(2)} (30%) | C3: $${c3.toFixed(2)} (30%)</div>
                                    <div class="text-red-400"><span class="font-bold">🛑 Stop-Loss:</span> $${sl.toFixed(2)}</div>
                                    <div class="text-emerald-400"><span class="font-bold">🎯 Targets:</span> TP1: $${tp1.toFixed(2)} (50%) | TP2: $${tp2.toFixed(2)} (30%) | TP3: $${tp3.toFixed(2)} (20%)</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            topActivosHTML += `</div>`;

            const btcPrecio = marketPrices["BTCUSDT"] ? `$${marketPrices["BTCUSDT"].toLocaleString()}` : "$59,150";
            
            textReportForSharing += `3. PROYECCIÓN Y ESCENARIOS:\n`;[cite: 6]
            textReportForSharing += `• Escenario Base (75%): Consolidación y rebote técnico diario hacia TP1 en las próximas 48-72h.\n`;[cite: 6]
            textReportForSharing += `• Escenario Alternativo (25%): Pérdida del pivote macro en BTC (${btcPrecio}) invalida el análisis.\n\n`;[cite: 6]
            textReportForSharing += `4. ADVERTENCIAS:\nAlta selectividad de liquidez. Se prioriza estrictamente la acción del precio real sobre indicadores retrasados.\n\n`;[cite: 6]
            textReportForSharing += `⚠️ Descargo de responsabilidad: Este análisis es una opinión personal basada en datos gráficos, no constituye una recomendación de inversión.\n\n`;[cite: 6]
            textReportForSharing += `👍 si mi contenido te es útil dale manito arriba y ayúdame a seguir analizando para ti.`;[cite: 6]

            const escenariosHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs">
                    <div class="bg-zinc-950 p-3 rounded-lg border border-zinc-800/60 space-y-1">
                        <h4 class="font-bold text-zinc-300">3. Proyección y Escenarios del Día</h4>
                        <p class="text-zinc-400"><span class="text-emerald-400 font-semibold">Escenario Base (75%):</span> Consolidación en los soportes actuales y posterior rebote técnico diario hacia las zonas de TP1 durante las próximas 48 a 72 horas.</p>
                        <p class="text-zinc-400"><span class="text-red-400 font-semibold">Escenario Alternativo (25%):</span> Pérdida directa del pivote macro en BTC (${btcPrecio}). Esto invalidará los gatillos locales y ejecutará los cierres preventivos de riesgo.</p>
                    </div>
                    <div class="bg-zinc-950 p-3 rounded-lg border border-zinc-800/60 space-y-1">
                        <h4 class="font-bold text-zinc-300">4. Advertencias DiDaily</h4>
                        <p class="text-zinc-400">Alta selectividad de liquidez en el mercado actual. Se prioriza estrictamente la acción del precio y el volumen real en cierres de velas diarias sobre indicadores técnicos retrasados.</p>
                    </div>
                </div>
            `;

            const footerHTML = `
                <div class="border-t border-zinc-800 pt-4 text-[11px] text-zinc-500 space-y-3">
                    <p class="leading-relaxed"><span class="font-semibold text-zinc-400 block mb-0.5">⚠️ Descargo de responsabilidad</span>
                    Este análisis refleja únicamente mi punto de vista personal basado en la información gráfica proporcionada. No constituye una recomendación de inversión. El mercado de las criptomonedas es altamente volátil y cualquier operación conlleva riesgos significativos. Se recomienda realizar su propio análisis y gestión de riesgo antes de tomar decisiones financieras.</p>
                    <p class="text-center font-semibold text-emerald-400/80 border-t border-zinc-900 pt-2 text-xs">si mi contenido te es útil dale manito arriba y ayúdame a seguir analizando para ti.</p>
                </div>
            `;

            container.innerHTML = headerHTML + dashboardHTML + topActivosHTML + escenariosHTML + footerHTML;
        }

        function copySharedText() {
            if (!textReportForSharing) return;
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(textReportForSharing).then(() => {
                    alert("🚀 ¡Reporte copiado! Listo para pegar en Telegram o WhatsApp.");
                }).catch(() => {
                    executeFallbackCopy(textReportForSharing);
                });
            } else {
                executeFallbackCopy(textReportForSharing);
            }
        }

        function executeFallbackCopy(text) {
            const tempTextArea = document.createElement("textarea");
            tempTextArea.value = text;
            tempTextArea.style.position = "fixed"; 
            tempTextArea.style.top = "0";
            tempTextArea.style.left = "0";
            tempTextArea.style.opacity = "0"; 
            document.body.appendChild(tempTextArea);
            tempTextArea.focus();
            tempTextArea.select();
            
            try {
                document.execCommand('copy');
                alert("🚀 ¡Reporte copiado con éxito (Modo Local)! Listo para pegar en tus redes.");
            } catch (err) {
                alert("Error crítico: Tu navegador bloqueó por completo el copiado automático local.");
            }
            document.body.removeChild(tempTextArea);
        }

        setDate();
        fetchPrices();
        setInterval(fetchPrices, 60000);
    </script>
</body>
</html>
